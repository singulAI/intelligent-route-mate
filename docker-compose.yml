services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ra-routes
    restart: unless-stopped
    ports:
      - "127.0.0.1:${HOST_PORT:-3100}:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000

networks:
  default:
    name: ra-routes-net
