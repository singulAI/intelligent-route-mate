<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Body -->
  <rect x="6" y="14" width="52" height="32" rx="6" fill="#3b6ef0"/>
  <!-- Windows row -->
  <rect x="12" y="20" width="10" height="8" rx="2" fill="#e8f0fe"/>
  <rect x="27" y="20" width="10" height="8" rx="2" fill="#e8f0fe"/>
  <rect x="42" y="20" width="10" height="8" rx="2" fill="#e8f0fe"/>
  <!-- Door -->
  <rect x="27" y="32" width="10" height="12" rx="1" fill="#1e4bd6"/>
  <!-- Undercarriage -->
  <rect x="6" y="44" width="52" height="6" rx="3" fill="#1e4bd6"/>
  <!-- Front/back bumpers -->
  <rect x="4" y="38" width="4" height="8" rx="2" fill="#1e4bd6"/>
  <rect x="56" y="38" width="4" height="8" rx="2" fill="#1e4bd6"/>
  <!-- Wheels -->
  <circle cx="18" cy="52" r="7" fill="#1a1a2e"/>
  <circle cx="18" cy="52" r="3" fill="#9ab0ff"/>
  <circle cx="46" cy="52" r="7" fill="#1a1a2e"/>
  <circle cx="46" cy="52" r="3" fill="#9ab0ff"/>
  <!-- Headlight -->
