  <!-- Tail light -->
  <rect x="4" y="22" width="4" height="6" rx="2" fill="#fca5a5"/>
  <!-- Destination sign -->
  <rect x="14" y="15" width="24" height="5" rx="1" fill="#1e4bd6"/>
